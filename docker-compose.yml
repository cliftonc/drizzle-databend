services:
  databend:
    # Server-side parameter binding requires Databend server > 1.2.900. The current
    # stable `latest` tag is 1.2.881, which makes the driver fall back to client-side
    # interpolation. Pin a nightly above the threshold so the test suite exercises the
    # real server-side binding path. Replace with a stable tag once one ships > 1.2.900.
    image: datafuselabs/databend:v1.2.919-nightly
    container_name: drizzle-databend-test
    ports:
      - "8124:8000"
      - "3407:3307"
    environment:
      QUERY_DEFAULT_USER: databend
      QUERY_DEFAULT_PASSWORD: databend
      QUERY_STORAGE_TYPE: fs
    volumes:
      - databend-meta:/var/lib/databend/meta
      - databend-query:/var/lib/databend/query
      - databend-logs:/var/log/databend
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  databend-meta:
  databend-query:
  databend-logs:
