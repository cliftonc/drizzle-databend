name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

  test:
    runs-on: ubuntu-latest
    services:
      databend:
        image: datafuselabs/databend
        env:
          MINIO_ENABLED: "true"
          QUERY_DEFAULT_USER: databend
          QUERY_DEFAULT_PASSWORD: databend
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -fs http://localhost:8000/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test --run
        env:
          DATABEND_DSN: "databend://databend:databend@localhost:8000/default?sslmode=disable"
